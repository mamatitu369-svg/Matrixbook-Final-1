<!doctype html>
<html lang="en">
  <head>
    <!-- Basic Setup -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- No favicon — suppress browser default request -->
    <link rel="icon" href="src/assets/logo.png" />

    <!-- Title -->
    <title>Matrix AI — Build websites from a single prompt</title>

    <!-- SEO -->
    <meta name="description" content="Matrixbook is a next-generation AI-powered social platform to connect, create, and communicate smarter." />
    <meta name="author" content="Matrixbook" />

    <!-- Fonts (works fine on local server with internet) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Pacifico&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">

    <!-- Open Graph (clean, no image) -->
    <meta property="og:title" content="Matrixbook — AI Social Platform" />
    <meta property="og:description" content="Connect, share, and build smarter with Matrixbook." />
    <meta property="og:type" content="website" />

    <!-- Twitter Meta (no external image) -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Matrixbook — AI Social Platform" />
    <meta name="twitter:description" content="AI-powered social experience with Matrixbook." />

  

  </head>

  <body>
    <div id="root"></div>

    <!-- Your React/Vite entry -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
